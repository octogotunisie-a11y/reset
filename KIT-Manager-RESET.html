          extend: {
            colors: {

              cond: ["Barlow Condensed", "sans-serif"],

              mono: ["Share Tech Mono", "monospace"],

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        background: #0d1117;
        color: #f0f6fc;
        font-family: "Barlow", sans-serif;
        overflow-x: hidden;
      }
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: #161b22;
      }
      ::-webkit-scrollbar-thumb {
        background: #30363d;
        border-radius: 2px;
      }
      .font-cond {
        font-family: "Barlow Condensed", sans-serif;
      }
      .font-mono- {
        font-family: "Share Tech Mono", monospace;
      }
      .hazard {
        background: repeating-linear-gradient(
          -45deg,
          #f97316,
          #f97316 8px,
          transparent 8px,
          transparent 16px
        );
        height: 3px;
      }
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        height: 4px;
        border-radius: 2px;
        outline: none;
        cursor: pointer;
        background: linear-gradient(
          90deg,
          #f97316 var(--pct, 50%),
          #21262d var(--pct, 50%)
        );
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #f97316;
        border: 2px solid #0d1117;
        box-shadow: 0 0 8px rgba(249, 115, 22, 0.5);
        cursor: pointer;
        transition: transform 0.15s;
      }
      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.25);
      }
      .card-tool {
        transition: all 0.2s;
        cursor: pointer;
      }
      .card-tool:hover {
        transform: translateY(-2px);
        border-color: #2dd4bf !important;
      }
      .tool-fade {
        animation: fadeSlide 0.3s ease;
      }
      @keyframes fadeSlide {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fiche-card {
        transition: all 0.25s;
        cursor: pointer;
      }
      .fiche-card:hover {
        transform: translateY(-4px) scale(1.02);
      }
      .fiche-card.active {
        border-color: #f97316 !important;
        background: #1f1208 !important;
      }
      .step-item {
        transition: all 0.2s;
        cursor: pointer;
      }
      .step-item:hover {
        background: #21262d !important;
      }
      .step-item.done {
        border-color: #2dd4bf !important;
        background: #041a18 !important;
      }
      .day-cell {
        aspect-ratio: 1;
        cursor: pointer;
        transition: all 0.15s;
        user-select: none;
      }
      .day-cell:hover:not(.checked) {
        border-color: #f97316 !important;
      }
      .day-cell.checked {
        background: #041a18 !important;
        border-color: #2dd4bf !important;
        color: #2dd4bf !important;
      }
      .kpi-input {
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 4px;
        padding: 4px 8px;
        color: #f0f6fc;
        font-family: "Share Tech Mono", monospace;
        width: 70px;
        text-align: center;
        font-size: 12px;
        transition: border-color 0.15s;
      }
      .kpi-input:focus {
        outline: none;
        border-color: #f97316;
      }
      .script-box {
        background: #080d12;
        border-radius: 8px;
        padding: 1rem;
        font-family: "Share Tech Mono", monospace;
        font-size: 11px;
        color: #8b949e;
        line-height: 1.8;
        white-space: pre-wrap;
      }
      .btn-primary {
        background: #f97316;
        color: #0d1117;
        font-family: "Barlow Condensed", sans-serif;
        font-weight: 700;
        letter-spacing: 1px;
        padding: 0.5rem 1.2rem;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        transition: all 0.15s;
        font-size: 13px;
        text-transform: uppercase;
      }
      .btn-primary:hover {
        background: #fb923c;
      }
      .btn-ghost {
        background: transparent;
        color: #8b949e;
        font-family: "Share Tech Mono", monospace;
        font-size: 10px;
        letter-spacing: 1px;
        padding: 0.4rem 0.9rem;
        border-radius: 4px;
        border: 1px solid #30363d;
        cursor: pointer;
        transition: all 0.15s;
        text-transform: uppercase;
      }
      .btn-ghost:hover {
        color: #f0f6fc;
        border-color: #8b949e;
      }
      .btn-teal {
        background: transparent;
        color: #2dd4bf;
        font-family: "Share Tech Mono", monospace;
        font-size: 10px;
        letter-spacing: 1px;
        padding: 0.4rem 0.9rem;
        border-radius: 4px;
        border: 1px solid #2dd4bf;
        cursor: pointer;
        transition: all 0.15s;
        text-transform: uppercase;
      }
      .btn-teal:hover {
        background: rgba(45, 212, 191, 0.1);
      }
      .notif {
        position: fixed;
        bottom: 1.5rem;
        right: 1.5rem;
        z-index: 999;
        background: #161b22;
        border: 1px solid #2dd4bf;
        border-radius: 8px;
        padding: 0.7rem 1.1rem;
        font-family: "Share Tech Mono", monospace;
        font-size: 0.75rem;
        color: #2dd4bf;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
        transform: translateY(4px);
      }
      .notif.show {
        opacity: 1;
        transform: translateY(0);
      }
      .progress-ring {
        transition: stroke-dashoffset 0.5s ease;
      }
      .contrat-field {
        background: transparent;
        border: none;
        border-bottom: 1px solid #30363d;
        color: #f0f6fc;
        font-family: "Barlow", sans-serif;
        font-size: 14px;
        width: 100%;
        padding: 4px 2px;
        outline: none;
        transition: border-color 0.2s;
      }
      .contrat-field:focus {
        border-color: #f97316;
      }
      .contrat-field::placeholder {
        color: #30363d;
      }
      [dir="rtl"] body {
        font-family: "Cairo", sans-serif;
      }
      [dir="rtl"] .font-cond {
        font-family: "Cairo", sans-serif;
      }
      [dir="rtl"] .font-mono- {
        font-family: "Cairo", sans-serif;
      }
      [dir="rtl"] .btn-ghost,
      [dir="rtl"] .btn-primary,
      [dir="rtl"] .btn-teal {
        font-family: "Cairo", sans-serif;
        letter-spacing: 0;
      }
      [dir="rtl"] .script-box,
      [dir="rtl"] .kpi-input {
        font-family: "Cairo", sans-serif;
      }
      [dir="rtl"] .lang-btn {
        font-family: "Share Tech Mono", monospace;
      }
      .lang-btn {
        font-family: "Share Tech Mono", monospace;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1px;
        padding: 6px 14px;
        border-radius: 5px;
        cursor: pointer;
        border: 1px solid;
        transition: all 0.15s;
        text-transform: uppercase;
        background: transparent;
      }
      .lang-btn.active {
        background: #f97316;
        color: #0d1117;
        border-color: #f97316;
      }
      .lang-btn:not(.active) {
        color: #8b949e;
        border-color: #30363d;
      }
      .lang-btn:not(.active):hover {
        color: #f0f6fc;
        border-color: #8b949e;
      }
      @media (max-width: 768px) {
        .main-grid {
          grid-template-columns: 1fr !important;
        }
      }

                rate_label: "Taux d'ancrage",
                routines: [
                  {
                    title: "Brief RESET du matin",
                    sub: "3 min · Chaque jour",
                    checks: [
                      "Focus jour",
                      "Énergie",
                      "Levier RESET",
                      "Micro-action",

                  {
                    title: "Feedback / Valorisation",
                    sub: "Fin de poste · Quotidien",
                    checks: [
                      "Feedback donné",
                      "Célébration",

                  {
                    title: "Micro-délégation",
                    sub: "1× par semaine",
                    checks: [

                      "Délai fixé",

                  {

        const checked = Object.values(data).filter(Boolean).length;

  <div class="mb-8">

              return '<div class="border-r border-b" style="border-color:#21262d;background:#080d12"></div>';

            return (
              '<div onclick="toggleDay30(' +

              ')" class="day-cell border-r border-b flex items-center justify-center text-xs font-bold ' +

              '" style="border-color:#21262d;background:' +
              (isChecked ? "#041a18" : "#0d1117") +

              (isChecked ? "#2dd4bf" : "#30363d") +

              (isChecked ? "✓" : day) +

          )
          .join("")}
      </div>
      <div class="flex justify-between items-center mt-4">
        <div class="text-sm" style="color:#8b949e">
          ${tr.rate_label} : <span class="font-bold" style="color:#f97316">${checked} / 30 ${lang === "ar" ? "يومًا" : " jours"}</span>

        <button onclick="resetCalendar()" class="btn-ghost" style="font-size:9px">${tr.reset}</button>

      }

      // ══════════════════════════════════════════════════════
      // HELPERS
      // ══════════════════════════════════════════════════════
      function calcEvolution() {
        const d = load("dashboard");
        const rows_fr = [
          { k: "R", label: "Reconnaissance" },
          { k: "E", label: "Équité" },
          { k: "S", label: "Sens" },
          { k: "EA", label: "Engagement/Apprentissage" },
          { k: "T", label: "Territoire/Autonomie" },
        ];
        const rows_ar = [
          { k: "R", label: "الاعتراف" },
          { k: "E", label: "العدالة" },
          { k: "S", label: "المعنى" },
          { k: "EA", label: "الانخراط/التعلم" },
          { k: "T", label: "الحدود/الاستقلالية" },
        ];
        const rows = lang === "ar" ? rows_ar : rows_fr;
        const panel = document.getElementById("evolution-panel");
        const ec = document.getElementById("evolution-content");
        panel.classList.remove("hidden");
        ec.innerHTML = rows
          .map((row) => {
            const t0 = d[row.k + "_T0"] || 0,
              t3 = d[row.k + "_T3"] || 0;
            const diff = t3 - t0,
              pct = t0 > 0 ? Math.round((diff / t0) * 100) : 0;
            const positive = diff >= 0;
            return `<div class="flex justify-between items-center py-1 border-b" style="border-color:#21262d30">
      <span class="text-xs" style="color:#f0f6fc">${row.label}</span>
      <span class="font-mono- text-xs font-bold" style="font-family:'Share Tech Mono',monospace;color:${positive ? "#2dd4bf" : "#f97316"}">
        ${positive ? "+" : ""}${diff.toFixed(1)} pts (${positive ? "+" : ""}${pct}%)
      </span>
    </div>`;
          })
          .join("");
      }

      // ── RADAR ──────────────────────────────────────────────────
      function updateRadar(k, val, color, input) {
        const v = parseInt(val);
        const el = document.getElementById("val-" + k);
        if (el) el.textContent = v;
        const pct = ((v - 1) / 9) * 100;
        input.style.setProperty("--pct", pct + "%");
        if (radarChartInstance) {
          const idx = L().findIndex((l) => l.k === k);
          if (idx >= 0) radarChartInstance.data.datasets[0].data[idx] = v;
          radarChartInstance.update();
          const total = L().reduce(
            (s, l, i) => s + (radarChartInstance.data.datasets[0].data[i] || 0),
            0,
          );
          const ts = document.getElementById("total-score");
          if (ts)
            ts.innerHTML =
              total +
              ' <span class="text-base font-normal" style="color:#8b949e">/ 50</span>';
        }
      }

      function saveRadar() {
        if (!radarChartInstance) return;
        const d = {};
        L().forEach(
          (l, i) => (d[l.k] = radarChartInstance.data.datasets[0].data[i]),
        );
        save("radar", d);
        notify(lang === "ar" ? "تم حفظ الرادار ✓" : "Radar enregistré ✓");
      }

      function resetRadar() {
        L().forEach((l) => {
          const inp = document.querySelector(`input[oninput*="'${l.k}'"]`);
          if (inp) {
            inp.value = 5;
            updateRadar(l.k, 5, l.color, inp);
          }
        });
      }

      // ── RELAA ───────────────────────────────────────────────────
      function toggleStep(i) {
        const done = load("relaa_done");
        done[i] = !done[i];
        save("relaa_done", done);
        relaa();
      }

      function resetRelaa() {
        save("relaa_done", {});
        relaa();
      }

      // ── FICHES ──────────────────────────────────────────────────
      function selectFiche(i) {
        save("fiches_sel", { i });
        fiches();
      }

      // ── CONTRAT ─────────────────────────────────────────────────
      function saveContrat() {
        const d = {
          nom: document.getElementById("c-nom").value,
          date: document.getElementById("c-date").value,
          sign: document.getElementById("c-sign").value,
        };
        [1, 2, 3].forEach((n) => {
          d["levier" + n] = document.getElementById("c-levier" + n).value;
          d["eng" + n] = document.getElementById("c-eng" + n).value;
          d["kpi" + n] = document.getElementById("c-kpi" + n).value;
        });
        save("contrat", d);
        notify(lang === "ar" ? "تم حفظ العقد ✓" : "Contrat sauvegardé ✓");
      }

      function printContrat() {
        saveContrat();
        window.print();
      }

      // ── DASHBOARD ───────────────────────────────────────────────
      function updateDash(k, p, val) {
        const d = load("dashboard");
        d[k + "_" + p] = parseFloat(val) || 0;
        save("dashboard", d);
      }

      function saveDash() {
        notify(
          lang === "ar"
            ? "تم حفظ لوحة القيادة ✓"
            : "Tableau de bord sauvegardé ✓",
        );
        initDashCharts();
      }

      function initDashCharts() {
        const d = load("dashboard");
        const periods = ["T0", "S04", "S06", "T3"];
        const levers = ["R", "E", "S", "EA", "T"];
        const avgScores = periods.map((p) => {
          const vals = levers.map((k) => d[k + "_" + p]).filter((v) => v > 0);
          return vals.length
            ? vals.reduce((a, b) => a + b, 0) / vals.length
            : null;
        });
        const relaaVals = periods.map((p) => d["NR_" + p] || null);
        const labels = lang === "ar" ? ["T0", "أ4", "أ6", "T3"] : periods;
        if (dashChartScore) {
          dashChartScore.destroy();
          dashChartScore = null;
        }
        if (dashChartRelaa) {
          dashChartRelaa.destroy();
          dashChartRelaa = null;
        }
        const sc = document.getElementById("scoreChart");
        if (sc)
          dashChartScore = new Chart(sc, {
            type: "line",
            data: {
              labels,
              datasets: [
                {
                  data: avgScores,
                  backgroundColor: "rgba(249,115,22,.15)",
                  borderColor: "#f97316",
                  borderWidth: 2,
                  pointBackgroundColor: "#f97316",
                  pointRadius: 5,
                  fill: true,
                  tension: 0.4,
                },
              ],
            },
            options: {
              plugins: { legend: { display: false } },
              scales: {
                x: {
                  grid: { color: "rgba(255,255,255,.04)" },
                  ticks: {
                    color: "#8b949e",
                    font: { family: "Share Tech Mono", size: 10 },
                  },
                },
                y: {
                  min: 0,
                  max: 10,
                  grid: { color: "rgba(255,255,255,.04)" },
                  ticks: {
                    color: "#8b949e",
                    font: { family: "Share Tech Mono", size: 10 },
                  },
                },
              },
            },
          });
        const rc = document.getElementById("relaaChart");
        if (rc)
          dashChartRelaa = new Chart(rc, {
            type: "bar",
            data: {
              labels,
              datasets: [
                {
                  data: relaaVals,
                  backgroundColor: [
                    "rgba(45,212,191,.3)",
                    "rgba(45,212,191,.5)",
                    "rgba(45,212,191,.7)",
                    "rgba(45,212,191,1)",
                  ],
                  borderColor: "#2dd4bf",
                  borderWidth: 1,
                  borderRadius: 4,
                },
              ],
            },
            options: {
              plugins: { legend: { display: false } },
              scales: {
                x: {
                  grid: { color: "rgba(255,255,255,.04)" },
                  ticks: {
                    color: "#8b949e",
                    font: { family: "Share Tech Mono", size: 10 },
                  },
                },
                y: {
                  min: 0,
                  grid: { color: "rgba(255,255,255,.04)" },
                  ticks: {
                    color: "#8b949e",
                    font: { family: "Share Tech Mono", size: 10 },
                  },
                },
              },
            },
          });
      }

      // ── FEEDBACK ────────────────────────────────────────────────
      function saveFbField(scriptId, fieldId, val) {
        const d = load("feedback");
        d[scriptId + "_" + fieldId] = val;
        save("feedback", d);
      }

      function generateScript(scriptId) {
        const script =
          window._fbScripts && window._fbScripts.find((s) => s.id === scriptId);
        if (!script) return;
        const d = load("feedback");
        const fieldData = {};
        script.fields.forEach(
          (f) => (fieldData[f.id] = d[scriptId + "_" + f.id] || ""),
        );
        const text = script.template(fieldData);
        const el = document.getElementById("gen-" + scriptId);
        if (el) {
          el.textContent = text;
          el.classList.remove("hidden");
        }
      }

      function copyScript(scriptId) {
        generateScript(scriptId);
        const el = document.getElementById("gen-" + scriptId);
        if (!el) return;
        navigator.clipboard
          .writeText(el.textContent)
          .then(() => notify(lang === "ar" ? "تم النسخ ✓" : "Script copié ✓"))
          .catch(() => {
            const ta = document.createElement("textarea");
            ta.value = el.textContent;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand("copy");
            document.body.removeChild(ta);
            notify(lang === "ar" ? "تم النسخ ✓" : "Script copié ✓");
          });
      }

      // ── ROUTINES ────────────────────────────────────────────────
      function toggleDay30(day) {
        const d = load("routines");
        d[day] = !d[day];
        save("routines", d);
        routines();
      }

      function resetCalendar() {
        save("routines", {});
        routines();
      }

      // ── COPY TEXT ───────────────────────────────────────────────
      function copyText(text) {
        navigator.clipboard
          .writeText(text)
          .then(() => notify("Copié ✓"))
          .catch(() => {
            const ta = document.createElement("textarea");
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand("copy");
            document.body.removeChild(ta);
            notify("Copié ✓");
          });
      }

      // ══════════════════════════════════════════════════════
      // INIT
      // ══════════════════════════════════════════════════════
      window.onload = () => {
        renderMenu();
        updateProgress();
      };
    </script>
